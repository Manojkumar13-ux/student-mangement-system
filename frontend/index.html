<!DOCTYPE html>
<html>
<head>
  <title>Student Management System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #f3f4f6; }
    .transition-all { transition: all 0.3s ease; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.2.0",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0",
      "react-router-dom": "https://esm.sh/react-router-dom@6.14.0"
    }
  }
  </script>

  <script type="module">
    import React, { useState, useEffect } from 'react';
    import ReactDOM from 'react-dom/client';
    import { BrowserRouter, Routes, Route, Link, useNavigate, useParams } from 'react-router-dom';

    const API = 'http://localhost:5000/api/v1';

    // ========== SIGNUP PAGE ==========
    function Signup() {
      const navigate = useNavigate();
      const [form, setForm] = useState({ email: '', password: '', fullName: '', studentId: '', department: '', phone: '' });
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true);
        try {
          const res = await fetch(`${API}/auth/signup`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(form)
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.message);
          localStorage.setItem('token', data.data.token);
          navigate('/dashboard');
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <div className="bg-white p-8 rounded-xl shadow-xl w-full max-w-md">
            <h2 className="text-3xl font-bold mb-6 text-center text-gray-800">📝 Sign Up</h2>
            {error && <div className="bg-red-100 text-red-700 p-3 rounded-lg mb-4">{error}</div>}
            <form onSubmit={handleSubmit}>
              <input name="fullName" placeholder="Full Name" onChange={(e) => setForm({...form, fullName: e.target.value})} className="w-full p-3 border rounded-lg mb-3 focus:outline-none focus:ring-2 focus:ring-blue-500" required />
              <input name="studentId" placeholder="Student ID" onChange={(e) => setForm({...form, studentId: e.target.value})} className="w-full p-3 border rounded-lg mb-3 focus:outline-none focus:ring-2 focus:ring-blue-500" required />
              <input name="department" placeholder="Department" onChange={(e) => setForm({...form, department: e.target.value})} className="w-full p-3 border rounded-lg mb-3 focus:outline-none focus:ring-2 focus:ring-blue-500" required />
              <input name="phone" placeholder="Phone Number" onChange={(e) => setForm({...form, phone: e.target.value})} className="w-full p-3 border rounded-lg mb-3 focus:outline-none focus:ring-2 focus:ring-blue-500" />
              <input name="email" type="email" placeholder="Email" onChange={(e) => setForm({...form, email: e.target.value})} className="w-full p-3 border rounded-lg mb-3 focus:outline-none focus:ring-2 focus:ring-blue-500" required />
              <input name="password" type="password" placeholder="Password (min 6)" onChange={(e) => setForm({...form, password: e.target.value})} className="w-full p-3 border rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500" required minLength="6" />
              <button type="submit" disabled={loading} className="w-full bg-blue-600 text-white p-3 rounded-lg hover:bg-blue-700 transition disabled:opacity-50 font-semibold">
                {loading ? 'Creating Account...' : 'Create Account'}
              </button>
            </form>
            <p className="mt-4 text-center text-gray-600">Already have an account? <Link to="/login" className="text-blue-600 hover:underline">Login</Link></p>
          </div>
        </div>
      );
    }

    // ========== LOGIN PAGE ==========
    function Login() {
      const navigate = useNavigate();
      const [form, setForm] = useState({ email: '', password: '' });
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      useEffect(() => {
        if (localStorage.getItem('token')) {
          navigate('/dashboard');
        }
      }, []);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true);
        try {
          const res = await fetch(`${API}/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(form)
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.message);
          localStorage.setItem('token', data.data.token);
          navigate('/dashboard');
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <div className="bg-white p-8 rounded-xl shadow-xl w-full max-w-md">
            <h2 className="text-3xl font-bold mb-6 text-center text-gray-800">🔐 Login</h2>
            {error && <div className="bg-red-100 text-red-700 p-3 rounded-lg mb-4">{error}</div>}
            <form onSubmit={handleSubmit}>
              <input name="email" type="email" placeholder="Email" onChange={(e) => setForm({...form, email: e.target.value})} className="w-full p-3 border rounded-lg mb-3 focus:outline-none focus:ring-2 focus:ring-blue-500" required />
              <input name="password" type="password" placeholder="Password" onChange={(e) => setForm({...form, password: e.target.value})} className="w-full p-3 border rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500" required />
              <button type="submit" disabled={loading} className="w-full bg-blue-600 text-white p-3 rounded-lg hover:bg-blue-700 transition disabled:opacity-50 font-semibold">
                {loading ? 'Logging in...' : 'Login'}
              </button>
            </form>
            <p className="mt-4 text-center text-gray-600">Don't have an account? <Link to="/signup" className="text-blue-600 hover:underline">Signup</Link></p>
          </div>
        </div>
      );
    }

    // ========== DASHBOARD ==========
    function Dashboard() {
      const navigate = useNavigate();
      const [students, setStudents] = useState([]);
      const [loading, setLoading] = useState(true);
      const [showForm, setShowForm] = useState(false);
      const [editingStudent, setEditingStudent] = useState(null);
      const [formData, setFormData] = useState({ fullName: '', studentId: '', department: '', phone: '' });

      const fetchStudents = async () => {
        const token = localStorage.getItem('token');
        if (!token) {
          navigate('/login');
          return;
        }
        try {
          const res = await fetch(`${API}/students`, {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          const data = await res.json();
          if (data.status === 'success') setStudents(data.data);
        } catch (error) {
          console.error('Error fetching students:', error);
        } finally {
          setLoading(false);
        }
      };

      useEffect(() => {
        fetchStudents();
      }, []);

      const handleLogout = () => {
        localStorage.removeItem('token');
        navigate('/login');
      };

      const handleSubmitStudent = async (e) => {
        e.preventDefault();
        const token = localStorage.getItem('token');
        const url = editingStudent ? `${API}/students/${editingStudent.id}` : `${API}/students`;
        const method = editingStudent ? 'PUT' : 'POST';

        try {
          const res = await fetch(url, {
            method,
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${token}`
            },
            body: JSON.stringify(formData)
          });
          const data = await res.json();
          if (data.status === 'success') {
            await fetchStudents();
            setShowForm(false);
            setEditingStudent(null);
            setFormData({ fullName: '', studentId: '', department: '', phone: '' });
          }
        } catch (error) {
          console.error('Error saving student:', error);
        }
      };

      const handleDeleteStudent = async (id) => {
        if (!confirm('Are you sure you want to delete this student?')) return;
        const token = localStorage.getItem('token');
        try {
          const res = await fetch(`${API}/students/${id}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${token}` }
          });
          if (res.ok) {
            await fetchStudents();
          }
        } catch (error) {
          console.error('Error deleting student:', error);
        }
      };

      const handleEditStudent = (student) => {
        setEditingStudent(student);
        setFormData({
          fullName: student.fullName,
          studentId: student.studentId,
          department: student.department,
          phone: student.phone || ''
        });
        setShowForm(true);
      };

      return (
        <div className="min-h-screen bg-gray-50 p-4 md:p-8">
          <div className="max-w-7xl mx-auto">
            <div className="bg-white rounded-xl shadow-lg p-6">
              <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                <div>
                  <h1 className="text-3xl font-bold text-gray-800">🎓 Student Dashboard</h1>
                  <p className="text-gray-500">Manage all students in the system</p>
                </div>
                <div className="flex gap-3">
                  <button 
                    onClick={() => { setShowForm(!showForm); setEditingStudent(null); setFormData({ fullName: '', studentId: '', department: '', phone: '' }); }}
                    className="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition font-semibold"
                  >
                    {showForm ? 'Cancel' : '+ Add Student'}
                  </button>
                  <button onClick={handleLogout} className="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600 transition font-semibold">
                    Logout
                  </button>
                </div>
              </div>

              {showForm && (
                <div className="bg-gray-50 p-6 rounded-lg mb-6 border">
                  <h3 className="text-xl font-semibold mb-4">{editingStudent ? 'Edit Student' : 'Add New Student'}</h3>
                  <form onSubmit={handleSubmitStudent} className="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input placeholder="Full Name" value={formData.fullName} onChange={(e) => setFormData({...formData, fullName: e.target.value})} className="p-2 border rounded" required />
                    <input placeholder="Student ID" value={formData.studentId} onChange={(e) => setFormData({...formData, studentId: e.target.value})} className="p-2 border rounded" required />
                    <input placeholder="Department" value={formData.department} onChange={(e) => setFormData({...formData, department: e.target.value})} className="p-2 border rounded" required />
                    <input placeholder="Phone" value={formData.phone} onChange={(e) => setFormData({...formData, phone: e.target.value})} className="p-2 border rounded" />
                    <button type="submit" className="col-span-full bg-green-600 text-white p-2 rounded hover:bg-green-700 transition font-semibold">
                      {editingStudent ? 'Update Student' : 'Add Student'}
                    </button>
                  </form>
                </div>
              )}

              {loading ? (
                <div className="text-center py-8">
                  <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto"></div>
                  <p className="mt-4 text-gray-500">Loading students...</p>
                </div>
              ) : students.length === 0 ? (
                <div className="text-center py-12 bg-gray-50 rounded-lg">
                  <p className="text-gray-400 text-lg">No students registered yet.</p>
                </div>
              ) : (
                <div className="overflow-x-auto">
                  <table className="w-full">
                    <thead className="bg-gray-100">
                      <tr>
                        <th className="p-3 text-left">ID</th>
                        <th className="p-3 text-left">Name</th>
                        <th className="p-3 text-left">Department</th>
                        <th className="p-3 text-left">Status</th>
                        <th className="p-3 text-left">Actions</th>
                      </tr>
                    </thead>
                    <tbody>
                      {students.map(s => (
                        <tr key={s.id} className="border-b hover:bg-gray-50 transition">
                          <td className="p-3 font-medium">{s.studentId}</td>
                          <td className="p-3">{s.fullName}</td>
                          <td className="p-3">{s.department}</td>
                          <td className="p-3">
                            <span className={`px-2 py-1 rounded-full text-xs font-semibold ${s.isActive ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                              {s.isActive ? '✅ Active' : '❌ Inactive'}
                            </span>
                          </td>
                          <td className="p-3">
                            <button onClick={() => handleEditStudent(s)} className="text-blue-600 hover:underline mr-3">Edit</button>
                            <button onClick={() => handleDeleteStudent(s.id)} className="text-red-600 hover:underline">Delete</button>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ========== APP ==========
    function App() {
      return (
        <BrowserRouter>
          <Routes>
            <Route path="/" element={<Login />} />
            <Route path="/login" element={<Login />} />
            <Route path="/signup" element={<Signup />} />
            <Route path="/dashboard" element={<Dashboard />} />
          </Routes>
        </BrowserRouter>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
